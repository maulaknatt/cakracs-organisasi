<!DOCTYPE html>
<html>
<head>
    <title>Sound Test</title>
</head>
<body style="background: #333; color: white; padding: 20px;">
    <h1>Sound Test</h1>
    <p>Click buttons to test audio files.</p>
    
    <div style="margin-bottom: 20px;">
        <h3>Join Sound (/sounds/join.mp3)</h3>
        <audio controls src="/sounds/join.mp3"></audio>
        <button onclick="playJoin()">Play via JS</button>
    </div>

    <div>
        <h3>Leave Sound (/sounds/leave.mp3)</h3>
        <audio controls src="/sounds/leave.mp3"></audio>
        <button onclick="playLeave()">Play via JS</button>
    </div>

    <script>
        function playJoin() {
            const audio = new Audio('/sounds/join.mp3');
            audio.play().then(() => console.log('Join played')).catch(e => console.error('Join error:', e));
        }
        function playLeave() {
            const audio = new Audio('/sounds/leave.mp3');
            audio.play().then(() => console.log('Leave played')).catch(e => console.error('Leave error:', e));
        }
    </script>
</body>
</html>
